<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="fg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0EA5E9"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <linearGradient id="fg2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10B981"/>
      <stop offset="60%" stop-color="#0EA5E9"/>
    </linearGradient>
  </defs>

  <!-- White rounded square background -->
  <rect width="32" height="32" rx="7" fill="#FFFFFF"/>
  <rect width="32" height="32" rx="7" fill="none" stroke="#E5E7EB" stroke-width="0.5"/>

  <!-- Mountain peaks -->
  <path d="M5 24 L11.5 8 L18 24 Z" fill="url(#fg)" opacity="0.45"/>
  <path d="M13 24 L20 9 L27 24 Z" fill="url(#fg2)"/>

  <!-- Sun/connection -->
  <circle cx="24" cy="9" r="2.5" fill="#0EA5E9"/>
  <circle cx="24" cy="9" r="4" fill="#0EA5E9" opacity="0.12"/>

  <!-- Ground -->
  <rect x="4" y="24" width="24" height="2" rx="1" fill="url(#fg)" opacity="0.25"/>
</svg>
