<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 38" fill="none">
  <defs>
    <linearGradient id="brand-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#34D399"/>
    </linearGradient>
    <radialGradient id="spark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1"/>
      <stop offset="60%" stop-color="#38BDF8" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#34D399" stop-opacity="0.9"/>
    </radialGradient>
  </defs>

  <!-- Spark mark -->
  <g>
    <circle cx="19" cy="19" r="6.5" fill="url(#spark)"/>
    <line x1="19" y1="3" x2="19" y2="8.5" stroke="url(#brand-grad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="19" y1="29.5" x2="19" y2="35" stroke="url(#brand-grad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="3" y1="19" x2="8.5" y2="19" stroke="url(#brand-grad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="29.5" y1="19" x2="35" y2="19" stroke="url(#brand-grad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="8" y1="8" x2="11.5" y2="11.5" stroke="url(#brand-grad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="26.5" y1="26.5" x2="30" y2="30" stroke="url(#brand-grad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="30" y1="8" x2="26.5" y2="11.5" stroke="url(#brand-grad)" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="11.5" y1="26.5" x2="8" y2="30" stroke="url(#brand-grad)" stroke-width="2.5" stroke-linecap="round"/>
  </g>

  <text x="43" y="25" font-family="'Outfit', system-ui, sans-serif" font-weight="800" font-size="22" letter-spacing="-0.5" fill="#FFFFFF">denver</text>
  <text x="125" y="25" font-family="'Outfit', system-ui, sans-serif" font-weight="800" font-size="22" letter-spacing="-0.5" fill="url(#brand-grad)">social</text>
</svg>
