<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96" role="img" aria-label="Event Sync Bot">
  <defs>
    <linearGradient id="bot-bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.6"/>
    </filter>
  </defs>

  <!-- Source dots, each in a real brand-ish color (Discord, Eventbrite, Luma, etc.) -->
  <circle cx="14" cy="14" r="6" fill="#5865F2"/>
  <circle cx="82" cy="14" r="6" fill="#F05537"/>
  <circle cx="14" cy="82" r="6" fill="#10B981"/>
  <circle cx="82" cy="82" r="6" fill="#3B82F6"/>

  <!-- Connecting lines from each source to the bot center -->
  <g stroke="#7C3AED" stroke-opacity="0.35" stroke-width="1.5" stroke-linecap="round">
    <line x1="20" y1="20" x2="36" y2="36"/>
    <line x1="76" y1="20" x2="60" y2="36"/>
    <line x1="20" y1="76" x2="36" y2="60"/>
    <line x1="76" y1="76" x2="60" y2="60"/>
  </g>

  <!-- Antenna -->
  <line x1="48" y1="22" x2="48" y2="32" stroke="#7C3AED" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="48" cy="20" r="3" fill="#7C3AED"/>

  <!-- Robot head: rounded square with gradient -->
  <rect x="30" y="32" width="36" height="34" rx="9" fill="url(#bot-bg)"/>

  <!-- Eyes -->
  <circle cx="40" cy="46" r="3" fill="#fff"/>
  <circle cx="56" cy="46" r="3" fill="#fff"/>
  <circle cx="40.8" cy="45.4" r="0.9" fill="#5B21B6"/>
  <circle cx="56.8" cy="45.4" r="0.9" fill="#5B21B6"/>

  <!-- Smile -->
  <path d="M40 56 Q48 62 56 56" stroke="#fff" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Side ears -->
  <rect x="26" y="44" width="4" height="10" rx="2" fill="#5B21B6"/>
  <rect x="66" y="44" width="4" height="10" rx="2" fill="#5B21B6"/>
</svg>
