name = "denver-social-hub"
compatibility_date = "2026-03-17"
compatibility_flags = ["nodejs_compat"]
main = "./worker-src/shim.ts"

[[d1_databases]]
binding = "DB"
database_name = "denver-social"
database_id = "402f83a5-8907-4666-8343-7d12e90ef9c3"

[[kv_namespaces]]
binding = "SESSION"
id = "4a5f93d2399b43d9bae85d0b61023857"

[assets]
binding = "ASSETS"
directory = "./dist"
run_worker_first = true


[triggers]
crons = [
  "0 14 * * *",   # Daily at 2pm UTC (8am MT) — potluck reminder emails
  "*/15 * * * *", # Every 15 minutes — event sync from all configured sources
]
